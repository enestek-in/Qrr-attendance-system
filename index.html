<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İTAK Ofis Yoklama</title>
    <style>
        :root {
            --primary: #003366;
            --secondary: #00509d;
            --success: #28a745;
            --error: #dc3545;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h2 { color: var(--primary); margin: 0; font-size: 1.5rem; }
        .header p { color: #666; font-size: 0.9rem; margin-top: 5px; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #444; font-size: 0.9rem; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e4e8;
            border-radius: 10px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus { border-color: var(--secondary); outline: none; box-shadow: 0 0 0 3px rgba(0,80,157,0.1); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        #status {
            margin-top: 1rem;
            padding: 10px;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>İTAK Ofis</h2>
        <p>Dijital Yoklama Sistemi</p>
    </div>

    <form id="itakForm">
        <div class="form-group">
            <label>Ad Soyad</label>
            <input type="text" name="ad_soyad" placeholder="Adınız ve Soyadınız" required>
        </div>

        <div class="form-group">
            <label>Öğrenci Numarası</label>
            <input type="number" name="ogrenci_no" id="stdID" placeholder="Örn: 211024..." required>
        </div>

        <div class="form-group">
            <label>Bölüm</label>
            <input type="text" name="bolum" placeholder="Bölümünüzü yazınız" required>
        </div>

        <button type="submit" id="submitBtn">Kaydı Tamamla</button>
    </form>

    <div id="status"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwMpCal-NtjL6kPZAc9KvYEZRdxJagJMujFJy64_HaNq9XsyS6QtbewPYAyVvhaXCrk/exec';
    const form = document.getElementById('itakForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const idValue = document.getElementById('stdID').value;

        // Tarayıcı bazlı basit engel (Aynı cihazdan 2. giriş)
        if (localStorage.getItem('sent_' + idValue)) {
            showMsg('Bu numara ile daha önce kayıt yapılmış.', '#dc3545');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = 'İşleniyor...';

        fetch(scriptURL, {
  method: 'POST',
  mode: 'no-cors',
  body: new FormData(form)
})
.then(() => {
  localStorage.setItem('sent_' + idValue, 'true');
  showMsg('Kaydınız başarıyla alındı!', '#28a745');
  form.reset();
  btn.disabled = false;
  btn.innerHTML = 'Kaydı Tamamla';
})
.catch(error => {
  showMsg('Bağlantı hatası! Lütfen tekrar deneyin.', '#dc3545');
  btn.disabled = false;
  btn.innerHTML = 'Tekrar Dene';
            });
    });

    function showMsg(text, color) {
        status.style.display = 'block';
        status.style.backgroundColor = color + '22';
        status.style.color = color;
        status.innerText = text;
    }
</script>

</body>
</html>
